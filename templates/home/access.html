<h2>Manage Access</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="text" name="project_name" placeholder="project name e.g. kit_website">
    <input type="email" name="email" placeholder="client@example.com">
    <button type="submit">Add</button>
</form>

<a href="{{ url_for('home.portal') }}" class="btn btn-primary">
    return home
</a>

<ul>
    {% for entry in access_list %}
    <li>{{ entry.project_name }} — {{ entry.email }}</li>
    {% endfor %}
</ul>
